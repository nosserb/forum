<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error {{.Code}}</title>
    <link rel="stylesheet" href="/statics/forum.css">
</head>
<body>
    <div class="container">
        <div id="errorModal" class="error-modal active">
            <div class="error-modal-content">
                <div class="error-modal-code" style="color: #fff; font-weight: 700; font-size: 32px;">{{.Code}}</div>
                <h2 class="error-modal-title">{{.Error}}</h2>
                <p class="error-modal-message">{{.Message}}</p>
                <button class="error-modal-btn" onclick="window.location.href='/'">OK</button>
            </div>
        </div>
    </div>
</body>
</html>
